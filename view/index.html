<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Gerenciador De Tarefas</title>
</head>
<body>
    <div class="title">
        <h1>Gerenciador de Tarefas</h1>
    </div>

        <div class="conteiner">
            <form action="/gerenciarTarefas" method="post">
                <div class="row mt-3">
                    <div class="col-12 mt-5">
                        <h3>Criar Nova Tarefa</h3>
                    </div>
                    <div class="col-6 mt-5">
                        <label for="nomeTarefa" class="form-label">Nome da Tarefa</label>
                        <input type="text" id="nomeTarefa" name="nometarefa" class="form-control" value="{{dados_form.nomeTarefa}}">
                    </div>
                    <div class="col-6 mt-5">
                        <label for="descricaoTarefa" class="form-label">Descrição</label>
                        <input type="text" id="descricaoTarefa" name="descricaoTarefa" class="form-control" value="{{dados_form.descricaoTarefa}}">
                    </div>
                    
                    <div class="col-6 mt-1">
                        <label for="nomeUser" class="form-label">Atribuida a</label>
                        <input type="text" id="nomeUser" name="nomeUser" class="form-control" value="{{dados_form.nomeUser}}">
                    </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100">CRIAR TAREFA</button>
                    </div>
                </div>
            </form>
        </div>
</body>
</html>
